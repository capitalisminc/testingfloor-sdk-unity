name: Unity meta files

on:
  push:
  pull_request:

jobs:
  check-meta-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Unity meta files
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          while IFS= read -r path; do
            case "$path" in
              ./.git|./.git/*|./.github|./.github/*|./.*|*.meta)
                continue
                ;;
            esac

            if [ ! -e "$path.meta" ]; then
              echo "::error file=${path#./}::Missing Unity .meta file"
              missing=1
            fi
          done < <(find . -mindepth 1 -print | sort)

          exit "$missing"
